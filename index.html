<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Lab Analyzer — 대전과학고등학교</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0a0e1a;--surface:#111827;--surfaceLight:#1a2236;--border:#2a3550;
  --borderFocus:#60a5fa;--accent:#60a5fa;--accentGlow:rgba(96,165,250,.15);
  --accentBright:#93c5fd;--success:#34d399;--successBg:rgba(52,211,153,.1);
  --warn:#fbbf24;--text:#e2e8f0;--textDim:#94a3b8;--textMuted:#64748b;
  --danger:#f87171;
  --mono:'JetBrains Mono','SF Mono','Fira Code',monospace;
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);padding:24px 16px;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select{background:var(--surfaceLight);border:1px solid var(--border);color:var(--text);
  padding:8px 12px;border-radius:6px;font-family:var(--mono);font-size:13px;outline:none;
  transition:border-color .2s;width:100%}
input:focus{border-color:var(--borderFocus);box-shadow:0 0 0 2px var(--accentGlow)}
input::placeholder{color:var(--textMuted)}

.wrap{max-width:960px;margin:0 auto}
.header{text-align:center;margin-bottom:32px}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:8px}
.logo-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#a78bfa);
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.logo h1{font-family:var(--mono);font-size:22px;font-weight:700;
  background:linear-gradient(135deg,var(--accentBright),#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:var(--textDim);font-size:13px}

.panel{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:20px;margin-bottom:16px;
  animation:fadeIn .3s ease-out}
.panel-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{font-size:11px;color:var(--textDim);font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;display:block;margin-bottom:4px}

.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab-btn{flex:1;padding:10px 0;border-radius:8px;border:none;font-family:var(--sans);
  font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-btn:not(.active){background:var(--surfaceLight);color:var(--textDim)}

.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:32px;height:34px;border-radius:6px;border:1px solid var(--border);
  background:var(--surfaceLight);color:var(--text);cursor:pointer;font-size:16px;font-weight:700}
.stepper span{font-family:var(--mono);font-size:16px;font-weight:600;min-width:24px;text-align:center}

table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
thead tr{background:var(--surfaceLight)}
th{padding:10px 8px;font-weight:600;border-bottom:1px solid var(--border);font-size:11px}
td{padding:6px 8px;text-align:center}
td input{padding:6px 8px;background:transparent;border:1px solid rgba(42,53,80,.27);text-align:center;width:100%}
.del-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;
  color:var(--danger);cursor:pointer;font-size:14px;opacity:.6}
.del-btn:disabled{opacity:.2;cursor:default}
.add-btn{padding:8px 20px;border-radius:8px;border:1px dashed var(--border);
  background:transparent;color:var(--accent);font-family:var(--sans);font-size:13px;
  font-weight:600;cursor:pointer;margin:12px 16px}
.note-box{margin-top:12px;padding:12px 16px;border-radius:10px;background:var(--surfaceLight);
  border:1px solid var(--border);font-size:12px;color:var(--textDim);font-family:var(--mono);line-height:1.7}

.empty{padding:40px;text-align:center;color:var(--textMuted)}
.empty-icon{font-size:40px;margin-bottom:12px}

.option-bar{display:flex;align-items:center;gap:20px;margin-bottom:16px;padding:12px 16px;
  background:var(--surface);border-radius:10px;border:1px solid var(--border)}
.chk-label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text)}
.chk-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);display:flex;
  align-items:center;justify-content:center;transition:all .2s;cursor:pointer;flex-shrink:0}
.chk-box.checked{border-color:var(--accent);background:var(--accent)}
.chk-box.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700}

.chart-wrap{background:var(--surface);border-radius:12px;border:1px solid var(--border);
  padding:20px 16px 12px;margin-bottom:16px}
.chart-wrap canvas{width:100%!important}

.model-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px}
.model-row.best{background:var(--successBg);border:1px solid rgba(52,211,153,.27)}
.model-row:not(.best){border:1px solid transparent}
.model-name{font-family:var(--mono);font-size:13px;font-weight:600}
.model-sub{font-size:10px;color:var(--textMuted)}
.r2-bar{flex:1;height:8px;background:var(--surfaceLight);border-radius:4px;overflow:hidden}
.r2-fill{height:100%;border-radius:4px;transition:width .5s ease}
.r2-val{font-family:var(--mono);font-size:13px;font-weight:700;min-width:70px;text-align:right}

.best-box{background:var(--surface);border-radius:12px;border:1px solid rgba(52,211,153,.27);
  padding:20px;margin-bottom:16px}
.best-formula{font-family:var(--mono);font-size:18px;font-weight:700;text-align:center;
  padding:16px 0;color:var(--accentBright);background:var(--accentGlow);border-radius:8px;margin-bottom:16px}
.stat-grid{display:grid;gap:12px;font-family:var(--mono);font-size:13px}
.stat-card{text-align:center;padding:12px;background:var(--surfaceLight);border-radius:8px}
.stat-label{color:var(--textMuted);font-size:10px;margin-bottom:4px}
.stat-val{font-weight:700;color:var(--accent)}

.footer{text-align:center;margin-top:32px;color:var(--textMuted);font-size:11px;font-family:var(--mono)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <!-- Header -->
  <div class="header">
    <div class="logo"><div class="logo-icon">λ</div><h1>Physics Lab Analyzer</h1></div>
    <p class="subtitle">실험 데이터 입력 → 불확도 계산 → 최적 물리량 관계 탐색</p>
  </div>

  <!-- Setup -->
  <div class="panel" id="setupPanel">
    <div class="panel-title" style="color:var(--accent)">⚙ 실험 변인 설정</div>
    <div class="grid2">
      <div class="field"><label>조작변인명</label><input id="indepName" placeholder="예: 질량"></div>
      <div class="field"><label>조작변인 단위</label><input id="indepUnit" placeholder="예: kg"></div>
      <div class="field"><label>종속변인명</label><input id="depName" placeholder="예: 늘어난 길이"></div>
      <div class="field"><label>종속변인 단위</label><input id="depUnit" placeholder="예: cm"></div>
      <div class="field"><label>측정도구 최소눈금</label><input id="minScale" type="number" step="any" placeholder="예: 0.1"></div>
      <div class="field"><label>포함인자 k</label><input id="kFactor" type="number" step="any" min="1" value="2" placeholder="보통 2"></div>
      <div class="field">
        <label>반복 측정 횟수</label>
        <div class="stepper">
          <button onclick="changeTrial(-1)">−</button>
          <span id="trialDisp">3</span>
          <button onclick="changeTrial(1)">+</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('data',this)">📊 데이터 입력</button>
    <button class="tab-btn" onclick="switchTab('results',this)">📈 결과 분석</button>
  </div>

  <!-- Data Tab -->
  <div id="dataTab">
    <div class="panel" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto"><table id="dataTable"><thead></thead><tbody></tbody></table></div>
      <div><button class="add-btn" onclick="addRow()">+ 행 추가</button></div>
    </div>
    <div id="noteBox" class="note-box" style="display:none"></div>
  </div>

  <!-- Results Tab -->
  <div id="resultsTab" style="display:none">
    <div id="emptyMsg" class="panel empty"><div class="empty-icon">📉</div><div style="font-size:14px">데이터 포인트를 2개 이상 입력하세요.</div></div>
    <div id="resultsContent" style="display:none">
      <div class="option-bar">
        <div class="chk-label" onclick="toggleOrigin()">
          <div class="chk-box" id="originChk"></div>
          <span>추세선 원점 (0, 0) 통과</span>
        </div>
      </div>
      <div class="chart-wrap">
        <div class="panel-title" style="color:var(--accent);margin-bottom:16px" id="mainChartTitle">📈 X vs Y</div>
        <canvas id="mainChart" height="340"></canvas>
      </div>
      <div class="panel" id="modelSection">
        <div class="panel-title" style="color:var(--accent);margin-bottom:16px">🔬 물리량 관계 탐색 (R² 비교)</div>
        <div id="modelList" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>
      <div class="best-box" id="bestBox"></div>
      <div class="chart-wrap" id="linChartWrap" style="display:none">
        <div class="panel-title" style="color:var(--accent);margin-bottom:16px" id="linChartTitle">📐 직선화 그래프</div>
        <canvas id="linChart" height="280"></canvas>
      </div>
      <div class="panel" style="padding:0;overflow:hidden" id="summaryWrap">
        <div class="panel-title" style="color:var(--accent);padding:16px 16px 8px">📋 결과 요약표</div>
        <div style="overflow-x:auto"><table id="summaryTable"><thead></thead><tbody></tbody></table></div>
      </div>
    </div>
  </div>

  <div class="footer">Physics Lab Analyzer · 대전과학고등학교</div>
</div>

<script>
// ═══ State ═══
let trialCount = 3, forceOrigin = false;
let rows = [{ x: '', trials: ['','',''] }];
let mainChartInst = null, linChartInst = null;

// ═══ Helpers ═══
const $ = id => document.getElementById(id);
const val = id => { const v = $(id)?.value; return v === '' ? '' : v; };
const numVal = id => parseFloat(val(id));

function formatNum(n, digits=4) {
  if (!isFinite(n)) return '—';
  if (Math.abs(n) < 1e-10) return '0';
  if (Math.abs(n) > 1e6 || (Math.abs(n) < 0.001 && n !== 0)) return n.toExponential(digits-1);
  return parseFloat(n.toPrecision(digits)).toString();
}
function roundU1sig(U) {
  if (!isFinite(U) || U === 0) return { rU: 0, dp: 0 };
  const d = Math.ceil(Math.log10(Math.abs(U)));
  const power = 1 - d;
  const mag = Math.pow(10, power);
  const rU = Math.round(U * mag) / mag;
  const dp = Math.max(0, power);
  return { rU, dp };
}
function fmtFixed(num, dp) {
  if (!isFinite(num)) return '—';
  if (dp < 0) { const m = Math.pow(10, -dp); return (Math.round(num / m) * m).toString(); }
  return num.toFixed(dp);
}

// ═══ Regression ═══
function linearRegression(xs, ys, fo=false) {
  const n = xs.length;
  if (n < 2) return { a:0, b:0, r2:0 };
  if (fo) {
    const sxy = xs.reduce((s,x,i) => s + x*ys[i], 0);
    const sxx = xs.reduce((s,x) => s + x*x, 0);
    if (Math.abs(sxx) < 1e-15) return { a:0, b:0, r2:0 };
    const a = sxy/sxx, b = 0;
    const ssRes = ys.reduce((s,y,i) => s + (y - a*xs[i])**2, 0);
    const ssTot = ys.reduce((s,y) => s + y*y, 0);
    return { a, b, r2: ssTot < 1e-15 ? 1 : 1 - ssRes/ssTot };
  }
  const sx = xs.reduce((a,b)=>a+b,0), sy = ys.reduce((a,b)=>a+b,0);
  const sxy = xs.reduce((s,x,i)=>s+x*ys[i],0), sxx = xs.reduce((s,x)=>s+x*x,0);
  const denom = n*sxx - sx*sx;
  if (Math.abs(denom) < 1e-15) return { a:0, b:0, r2:0 };
  const a = (n*sxy - sx*sy)/denom, b = (sy - a*sx)/n;
  const ssRes = ys.reduce((s,y,i) => s + (y - (a*xs[i]+b))**2, 0);
  const meanY = sy/n;
  const ssTot = ys.reduce((s,y) => s + (y-meanY)**2, 0);
  return { a, b, r2: ssTot < 1e-15 ? 1 : 1 - ssRes/ssTot };
}

function tryModels(xVals, yMeans, fo=false) {
  const valid = xVals.map((x,i) => ({x, y:yMeans[i]})).filter(p => isFinite(p.x) && isFinite(p.y));
  if (valid.length < 2) return [];
  const xs = valid.map(p=>p.x), ys = valid.map(p=>p.y);
  const sfx = fo ? '' : ' + b';
  const models = [];

  { const {a,b,r2} = linearRegression(xs,ys,fo);
    models.push({name:`y = ax${sfx}`,label:'선형 (linear)',a,b,r2,fn:x=>a*x+b,transform:'x'}); }
  { const xs2=xs.map(x=>x*x); const {a,b,r2}=linearRegression(xs2,ys,fo);
    models.push({name:`y = ax²${sfx}`,label:'이차 (quadratic)',a,b,r2,fn:x=>a*x*x+b,transform:'x²'}); }
  { const f=valid.filter(p=>Math.abs(p.x)>1e-12);
    if(f.length>=2){const xi=f.map(p=>1/p.x),yi=f.map(p=>p.y);const{a,b,r2}=linearRegression(xi,yi,fo);
    models.push({name:`y = a/x${sfx}`,label:'반비례 (inverse)',a,b,r2,fn:x=>Math.abs(x)>1e-12?a/x+b:NaN,transform:'1/x'});} }
  { const f=valid.filter(p=>p.x>=0);
    if(f.length>=2){const xsq=f.map(p=>Math.sqrt(p.x)),yi=f.map(p=>p.y);const{a,b,r2}=linearRegression(xsq,yi,fo);
    models.push({name:`y = a√x${sfx}`,label:'제곱근 (sqrt)',a,b,r2,fn:x=>x>=0?a*Math.sqrt(x)+b:NaN,transform:'√x'});} }
  { const f=valid.filter(p=>p.x>0);
    if(f.length>=2){const xl=f.map(p=>Math.log(p.x)),yi=f.map(p=>p.y);const{a,b,r2}=linearRegression(xl,yi,fo);
    models.push({name:`y = a·ln(x)${sfx}`,label:'로그 (log)',a,b,r2,fn:x=>x>0?a*Math.log(x)+b:NaN,transform:'ln(x)'});} }
  { const f=valid.filter(p=>Math.abs(p.x)>1e-12);
    if(f.length>=2){const xi2=f.map(p=>1/(p.x*p.x)),yi=f.map(p=>p.y);const{a,b,r2}=linearRegression(xi2,yi,fo);
    models.push({name:`y = a/x²${sfx}`,label:'역제곱 (inv sq)',a,b,r2,fn:x=>Math.abs(x)>1e-12?a/(x*x)+b:NaN,transform:'1/x²'});} }

  return models.sort((a,b) => b.r2 - a.r2);
}

// ═══ Compute ═══
function computeAll() {
  const ms = numVal('minScale') || 0;
  const k = numVal('kFactor') || 2;
  const uB = ms > 0 ? (ms/2) / Math.sqrt(3) : 0;

  const data = [];
  for (const row of rows) {
    const x = parseFloat(row.x);
    const vals = row.trials.map(v => parseFloat(v)).filter(v => isFinite(v));
    const n = vals.length;
    if (!isFinite(x) || n === 0) continue;
    const mean = vals.reduce((a,b)=>a+b,0) / n;
    let uA = 0;
    if (n > 1) { const variance = vals.reduce((s,v)=>s+(v-mean)**2,0)/(n-1); uA = Math.sqrt(variance/n); }
    const uC = Math.sqrt(uA*uA + uB*uB);
    const U = k * uC;
    const halfRange = n > 1 ? (Math.max(...vals)-Math.min(...vals))/2 : 0;
    data.push({ x, vals, n, mean, uA, uB, uC, U, halfRange });
  }
  return data;
}

// ═══ Tab switching ═══
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  $('dataTab').style.display = tab === 'data' ? '' : 'none';
  $('resultsTab').style.display = tab === 'results' ? '' : 'none';
  if (tab === 'results') renderResults();
}

// ═══ Trial count ═══
function changeTrial(d) {
  trialCount = Math.max(1, Math.min(10, trialCount + d));
  $('trialDisp').textContent = trialCount;
  rows.forEach(r => { while(r.trials.length < trialCount) r.trials.push(''); r.trials = r.trials.slice(0, trialCount); });
  renderDataTable();
}

// ═══ Rows ═══
function addRow() { rows.push({ x:'', trials: Array(trialCount).fill('') }); renderDataTable(); }
function removeRow(i) { if (rows.length > 1) { rows.splice(i,1); renderDataTable(); } }

// ═══ Data Table ═══
function renderDataTable() {
  const indep = val('indepName') || 'X';
  const dep = val('depName') || 'Y';
  const iu = val('indepUnit') ? ` (${val('indepUnit')})` : '';
  const du = val('depUnit') ? ` (${val('depUnit')})` : '';
  const cd = computeAll();

  let hdr = `<tr><th style="color:var(--textDim);min-width:40px">#</th>
    <th style="color:var(--accent);min-width:90px;text-align:left">${indep}${iu}</th>`;
  for (let t=0;t<trialCount;t++) hdr += `<th style="color:var(--textDim);min-width:80px;text-align:left">${t+1}차${du}</th>`;
  hdr += `<th style="color:var(--success);min-width:70px">평균</th>
    <th style="color:var(--warn);min-width:80px">확장불확도 U</th>
    <th style="min-width:36px"></th></tr>`;
  $('dataTable').querySelector('thead').innerHTML = hdr;

  let body = '';
  rows.forEach((row, i) => {
    const d = cd.find(c => c.x === parseFloat(row.x));
    let meanStr = '—', uStr = '—';
    if (d) {
      const {rU, dp} = roundU1sig(d.U);
      meanStr = fmtFixed(d.mean, dp);
      uStr = '±' + fmtFixed(rU, dp);
    }
    body += `<tr style="border-bottom:1px solid rgba(42,53,80,.13)">
      <td style="color:var(--textMuted)">${i+1}</td>
      <td><input type="number" step="any" value="${row.x}" onchange="rows[${i}].x=this.value;renderDataTable()"></td>`;
    for (let t=0;t<trialCount;t++)
      body += `<td><input type="number" step="any" value="${row.trials[t]}" onchange="rows[${i}].trials[${t}]=this.value;renderDataTable()"></td>`;
    body += `<td style="color:var(--success);font-weight:600">${meanStr}</td>
      <td style="color:var(--warn);font-weight:600">${uStr}</td>
      <td><button class="del-btn" onclick="removeRow(${i})" ${rows.length<=1?'disabled':''}>✕</button></td></tr>`;
  });
  $('dataTable').querySelector('tbody').innerHTML = body;

  // Note box
  const ms = numVal('minScale');
  if (ms > 0) {
    const k = numVal('kFactor') || 2;
    const uBval = (ms/2)/Math.sqrt(3);
    $('noteBox').style.display = '';
    $('noteBox').innerHTML = `<span style="color:var(--warn)">※ 불확도 산출 방식</span><br>
      A형 불확도 u<sub>A</sub> = s / √n (표준편차 / √반복횟수)<br>
      B형 불확도 u<sub>B</sub> = (최소눈금/2) / √3 = ${formatNum(uBval)}<br>
      합성표준불확도 u<sub>c</sub> = √(u<sub>A</sub>² + u<sub>B</sub>²)<br>
      <span style="color:var(--accent)">확장 불확도 U = k × u<sub>c</sub> (k = ${k})</span>`;
  } else { $('noteBox').style.display = 'none'; }
}

// ═══ Origin toggle ═══
function toggleOrigin() {
  forceOrigin = !forceOrigin;
  const box = $('originChk');
  box.classList.toggle('checked', forceOrigin);
  renderResults();
}

// ═══ Chart.js error bar plugin ═══
const errorBarPlugin = {
  id: 'errorBars',
  afterDatasetsDraw(chart) {
    const meta = chart.getDatasetMeta(0);
    if (!meta || !meta.data) return;
    const ctx = chart.ctx;
    const rawData = chart.data.datasets[0]?.errorBars;
    if (!rawData) return;
    ctx.save();
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2;
    meta.data.forEach((pt, i) => {
      const u = rawData[i];
      if (!u || u === 0) return;
      const yScale = chart.scales.y;
      const yTop = yScale.getPixelForValue(chart.data.datasets[0].data[i].y + u);
      const yBot = yScale.getPixelForValue(chart.data.datasets[0].data[i].y - u);
      const cx = pt.x, capW = 6;
      ctx.beginPath();
      ctx.moveTo(cx, yTop); ctx.lineTo(cx, yBot); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - capW, yTop); ctx.lineTo(cx + capW, yTop); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - capW, yBot); ctx.lineTo(cx + capW, yBot); ctx.stroke();
    });
    ctx.restore();
  }
};

// ═══ Render results ═══
function renderResults() {
  const cd = computeAll();
  const hasData = cd.length >= 2;
  $('emptyMsg').style.display = hasData ? 'none' : '';
  $('resultsContent').style.display = hasData ? '' : 'none';
  if (!hasData) return;

  const indep = val('indepName') || 'X';
  const dep = val('depName') || 'Y';
  const iu = val('indepUnit') ? ` (${val('indepUnit')})` : '';
  const du = val('depUnit') ? ` (${val('depUnit')})` : '';
  const k = numVal('kFactor') || 2;

  const xVals = cd.map(d => d.x);
  const yMeans = cd.map(d => d.mean);
  const models = tryModels(xVals, yMeans, forceOrigin);
  const best = models[0] || null;

  // ── Main Chart ──
  $('mainChartTitle').textContent = `📈 ${indep} vs ${dep} (with best fit)`;

  const scatterPts = cd.map(d => ({ x: d.x, y: d.mean }));
  const errorBars = cd.map(d => d.U);

  // fitted line
  const xMin = forceOrigin ? Math.min(0, ...xVals) : Math.min(...xVals);
  const xMax = Math.max(...xVals);
  const fitPts = [];
  if (best) {
    for (let i = 0; i <= 80; i++) {
      const xv = xMin + (xMax - xMin) * i / 80;
      const yv = best.fn(xv);
      if (isFinite(yv)) fitPts.push({ x: xv, y: yv });
    }
  }

  // Y axis range to accommodate error bars
  const allYs = cd.flatMap(d => [d.mean - d.U, d.mean + d.U]);
  if (fitPts.length) fitPts.forEach(p => allYs.push(p.y));
  const yMin = Math.min(...allYs), yMax = Math.max(...allYs);
  const yPad = (yMax - yMin) * 0.08 || 1;

  if (mainChartInst) mainChartInst.destroy();
  mainChartInst = new Chart($('mainChart'), {
    type: 'scatter',
    data: {
      datasets: [
        { label: dep, data: scatterPts, errorBars,
          backgroundColor: '#60a5fa', borderColor: '#60a5fa', pointRadius: 5, pointHoverRadius: 7, order: 2 },
        { label: 'Best Fit', data: fitPts, type: 'line',
          borderColor: '#a78bfa', borderWidth: 2, pointRadius: 0, fill: false, order: 1, tension: 0.3 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { title: { display: true, text: `${indep}${iu}`, color: '#94a3b8', font: { family: "'Pretendard',sans-serif", size: 12 } },
             ticks: { color: '#64748b', font: { family: "'JetBrains Mono',monospace", size: 11 } }, grid: { color: '#2a3550' } },
        y: { title: { display: true, text: `${dep}${du}`, color: '#94a3b8', font: { family: "'Pretendard',sans-serif", size: 12 } },
             ticks: { color: '#64748b', font: { family: "'JetBrains Mono',monospace", size: 11 } }, grid: { color: '#2a3550' },
             min: yMin - yPad, max: yMax + yPad }
      },
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { family: "'JetBrains Mono',monospace", size: 11 } } },
        tooltip: { backgroundColor: '#1a2236', borderColor: '#2a3550', borderWidth: 1, titleColor: '#94a3b8', bodyColor: '#e2e8f0',
          bodyFont: { family: "'JetBrains Mono',monospace" } }
      }
    },
    plugins: [errorBarPlugin]
  });

  // ── Model list ──
  let mhtml = '';
  models.forEach((m, i) => {
    const is0 = i === 0;
    const bw = Math.max(0, m.r2) * 100;
    mhtml += `<div class="model-row${is0?' best':''}">
      ${is0?'<span style="font-size:16px">🏆</span>':''}
      <div style="min-width:130px">
        <div class="model-name" style="color:${is0?'var(--success)':'var(--text)'}">${m.name}</div>
        <div class="model-sub">${m.label}</div>
      </div>
      <div class="r2-bar"><div class="r2-fill" style="width:${bw}%;background:${is0?'linear-gradient(90deg,var(--success),#6ee7b7)':'linear-gradient(90deg,rgba(96,165,250,.53),rgba(96,165,250,.27))'}"></div></div>
      <div class="r2-val" style="color:${is0?'var(--success)':'var(--textDim)'}">R²=${formatNum(m.r2)}</div>
    </div>`;
  });
  $('modelList').innerHTML = mhtml;

  // ── Best box ──
  if (best) {
    const formula = best.name.replace('x', indep).replace('y', dep);
    const cols = forceOrigin ? '1fr 1fr' : '1fr 1fr 1fr';
    let cards = `<div class="stat-card"><div class="stat-label">기울기 a</div><div class="stat-val">${formatNum(best.a)}</div></div>`;
    if (!forceOrigin) cards += `<div class="stat-card"><div class="stat-label">절편 b</div><div class="stat-val">${formatNum(best.b)}</div></div>`;
    cards += `<div class="stat-card"><div class="stat-label">결정계수 R²</div><div class="stat-val" style="color:var(--success)">${formatNum(best.r2)}</div></div>`;
    $('bestBox').innerHTML = `<div class="panel-title" style="color:var(--success);margin-bottom:12px">✅ 최적 관계식 (Best Fit)</div>
      <div class="best-formula">${formula}</div>
      <div class="stat-grid" style="grid-template-columns:${cols}">${cards}</div>`;
    $('bestBox').style.display = '';
  } else { $('bestBox').style.display = 'none'; }

  // ── Linearized chart ──
  if (best && best.transform !== 'x') {
    const linData = cd.map(d => {
      let tx = d.x;
      const t = best.transform;
      if (t === 'x²') tx = d.x*d.x;
      else if (t === '1/x') tx = Math.abs(d.x)>1e-12? 1/d.x : NaN;
      else if (t === '√x') tx = d.x>=0? Math.sqrt(d.x) : NaN;
      else if (t === 'ln(x)') tx = d.x>0? Math.log(d.x) : NaN;
      else if (t === '1/x²') tx = Math.abs(d.x)>1e-12? 1/(d.x*d.x) : NaN;
      return isFinite(tx) ? { x: tx, y: d.mean } : null;
    }).filter(Boolean);

    if (linData.length >= 2) {
      $('linChartWrap').style.display = '';
      $('linChartTitle').textContent = `📐 직선화 그래프 (${best.transform} vs ${dep})`;

      // linearized fit line
      const lxs = linData.map(p=>p.x), lys = linData.map(p=>p.y);
      const lxMin = Math.min(...lxs), lxMax = Math.max(...lxs);
      const linFit = [];
      for (let i=0;i<=40;i++) { const xv = lxMin+(lxMax-lxMin)*i/40; linFit.push({x:xv, y:best.a*xv+best.b}); }

      if (linChartInst) linChartInst.destroy();
      linChartInst = new Chart($('linChart'), {
        type: 'scatter',
        data: { datasets: [
          { label: dep, data: linData, backgroundColor: '#34d399', borderColor: '#34d399', pointRadius: 5, order: 2 },
          { label: 'Fit', data: linFit, type: 'line', borderColor: '#34d39977', borderWidth: 2, borderDash: [6,3], pointRadius: 0, fill: false, order: 1 }
        ] },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            x: { title: { display:true, text:best.transform, color:'#94a3b8' }, ticks:{color:'#64748b',font:{family:"'JetBrains Mono',monospace",size:11}}, grid:{color:'#2a3550'} },
            y: { title: { display:true, text:`${dep}${du}`, color:'#94a3b8' }, ticks:{color:'#64748b',font:{family:"'JetBrains Mono',monospace",size:11}}, grid:{color:'#2a3550'} }
          },
          plugins: { legend:{labels:{color:'#94a3b8'}}, tooltip:{backgroundColor:'#1a2236',borderColor:'#2a3550',borderWidth:1,bodyColor:'#e2e8f0'} }
        }
      });
    } else { $('linChartWrap').style.display = 'none'; }
  } else {
    $('linChartWrap').style.display = 'none';
    if (linChartInst) { linChartInst.destroy(); linChartInst = null; }
  }

  // ── Summary table ──
  let shdr = `<tr><th style="color:var(--accent)">${indep}${iu}</th>
    <th style="color:var(--success)">평균${du}</th>
    <th style="color:var(--textDim)">u<sub>A</sub></th>
    <th style="color:var(--textDim)">u<sub>B</sub></th>
    <th style="color:var(--textDim)">u<sub>c</sub></th>
    <th style="color:var(--warn)">U (k=${k})</th>
    <th style="color:var(--textDim)">범위/2</th></tr>`;
  $('summaryTable').querySelector('thead').innerHTML = shdr;

  let sbody = '';
  cd.forEach(d => {
    const {rU, dp} = roundU1sig(d.U);
    sbody += `<tr style="border-bottom:1px solid rgba(42,53,80,.13)">
      <td style="font-weight:600">${formatNum(d.x)}</td>
      <td style="color:var(--success);font-weight:600">${fmtFixed(d.mean, dp)}</td>
      <td style="color:var(--textMuted)">${formatNum(d.uA)}</td>
      <td style="color:var(--textMuted)">${formatNum(d.uB)}</td>
      <td style="color:var(--textMuted)">±${formatNum(d.uC)}</td>
      <td style="color:var(--warn);font-weight:600">±${fmtFixed(rU, dp)}</td>
      <td style="color:var(--textMuted)">±${formatNum(d.halfRange)}</td></tr>`;
  });
  $('summaryTable').querySelector('tbody').innerHTML = sbody;
}

// ═══ Auto-update on setting changes ═══
['indepName','indepUnit','depName','depUnit','minScale','kFactor'].forEach(id => {
  $(id).addEventListener('input', () => renderDataTable());
});

// ═══ Init ═══
renderDataTable();
</script>
</body>
</html>
